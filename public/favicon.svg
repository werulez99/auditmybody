  <!-- Magnifying glass (audit) -->
  <circle cx="36" cy="16" r="7" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.8"/>
  <line x1="41" y1="21" x2="45" y2="25" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <!-- Checkmark in magnifier -->
